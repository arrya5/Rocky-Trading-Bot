name: Pre-Market Research

on:
  schedule:
    - cron: "0 3 * * 1-5"   # 03:00 UTC = 08:30 IST, Mon–Fri
  workflow_dispatch:        # manual trigger from GitHub UI

# Ensure only one pre-market run at a time
concurrency:
  group: rocky-routine
  cancel-in-progress: false

permissions:
  contents: write           # needed to commit back to main

jobs:
  pre-market:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so we can rebase if needed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-runner.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-runner.txt

      - name: Run pre-market routine
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          HERMES_API_KEY:      ${{ secrets.HERMES_API_KEY }}
          PAPER_TRADING:       "true"
          PYTHONUTF8:          "1"
        run: |
          python scripts/runners/pre_market.py

      - name: Commit and push memory updates
        run: |
          git config user.name "rocky-bot"
          git config user.email "rocky-bot@users.noreply.github.com"
          git add memory/ || true
          if ! git diff --staged --quiet; then
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "pre-market: $DATE | research + candidates"
            # Rebase in case other routines committed
            git pull --rebase origin master || true
            git push origin HEAD:master
          else
            echo "No memory changes to commit."
          fi
