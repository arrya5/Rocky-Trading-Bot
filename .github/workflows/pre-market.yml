name: Pre-Market Routine

on:
  schedule:
    - cron: '0 3 * * 1-5'   # 8:30 AM IST (3:00 AM UTC), Mon-Fri
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  pre-market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-market routine
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          PAPER_TRADING:        'true'
          TF_ENABLE_ONEDNN_OPTS: '0'
          TF_CPP_MIN_LOG_LEVEL: '3'
        run: python scripts/runners/pre_market.py

      - name: Commit and push
        run: |
          git config user.name  "trading-bot[auto]"
          git config user.email "bot@trading-bot.local"
          git add memory/
          git diff --staged --quiet || git commit -m "pre-market: $(date +%Y-%m-%d) [auto]"
          git push
